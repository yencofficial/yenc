backend:
  name: github
  repo: yencofficial/yenc
  branch: main
  base_url: https://yenc-gw7fuz1hs-yencalauagofficial-5780s-projects.vercel.app
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "YENC Journal"
    files:
      - label: "Blog Posts"
        name: "posts"
        file: "data/post.json"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Category", name: "category", widget: "select", options: ["Leadership", "Education", "Community"] }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Excerpt", name: "excerpt", widget: "text" }
          - { label: "Image URL", name: "image", widget: "string" }
          - { label: "Path", name: "url", widget: "hidden", default: "blog.html" }
