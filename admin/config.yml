backend:
  name: github
  repo: yencofficial/yenc
  branch: main
  base_url: https://decap-cms-oauth-node.vercel.app/callback # Or your preview URL
  auth_endpoint: auth
  
media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "YENC Journal"
    files: # <--- Changed from 'file' to 'files' to support individual file tracking
      - label: "Blog Posts"
        name: "posts"
        file: "data/post.json" # <--- Decap maps fields inside a single-file object structure
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Category", name: "category", widget: "select", options: ["Leadership", "Education", "Community"] }
          - { label: "Date", name: "date", widget: "string" }
          - { label: "Excerpt", name: "excerpt", widget: "text" }
          - { label: "Image URL", name: "image", widget: "string" }
          - { label: "Path", name: "url", widget: "hidden", default: "blog.html" }
