<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | YENC</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --navy: #030D1E; --gold: #C5A059; --cream: #FCFCF9; }
        body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: #2D3748; margin: 0; }
        
        .nav-simple { background: var(--navy); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .article-container { max-width: 800px; margin: 60px auto; padding: 0 5%; min-height: 60vh; }
        
        .back-btn { color: var(--gold); text-decoration: none; font-weight: 700; font-size: 0.9rem; margin-bottom: 2rem; display: inline-block; transition: 0.3s; }
        .back-btn:hover { opacity: 0.7; transform: translateX(-5px); }
        
        .post-label { color: var(--gold); text-transform: uppercase; font-weight: 800; font-size: 0.75rem; letter-spacing: 1px; }
        .post-title { font-size: 3rem; color: var(--navy); margin: 0.5rem 0 1.5rem; line-height: 1.1; }
        
        .post-img { width: 100%; height: 450px; object-fit: cover; border-radius: 16px; margin-bottom: 2.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .post-text { font-size: 1.2rem; line-height: 1.8; margin-bottom: 4rem; }
        .post-text blockquote { border-left: 4px solid var(--gold); padding-left: 20px; font-style: italic; font-size: 1.5rem; margin: 2rem 0; color: var(--navy); }

        /* INTERACTION BAR (Simplified) */
        .interaction-bar { display: flex; gap: 15px; padding: 25px 0; border-top: 1px solid #e2e8f0; margin-bottom: 40px; }
        .action-btn { background: white; border: 1px solid #e2e8f0; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; color: var(--navy); }
        .action-btn:hover { border-color: var(--gold); }
        .action-btn.active { background: #fee2e2; border-color: #ef4444; color: #ef4444; }

        /* SHARE MODAL */
        #share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .share-link { padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; }
        .fb { background: #1877F2; } .x-com { background: #000; } .threads { background: #000; } .copy { background: var(--gold); }

        /* AUTHOR BOX */
        .author-box { display: flex; align-items: center; gap: 20px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 80px; }
        .author-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }

        /* FOOTER */
        .footer { background: var(--navy); color: white; padding: 60px 5% 30px; text-align: center; border-top: 2px solid var(--gold); }
        .footer-logo { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .footer-logo span { color: var(--gold); }
        
        @media (max-width: 768px) { .post-title { font-size: 2.2rem; } .post-img { height: 300px; } .author-box { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

    <nav class="nav-simple">
        <a href="../index.html" style="color:white; text-decoration:none; font-weight:bold; font-size:1.2rem;">YENC<span>.</span></a>
        <a href="../blog.html" style="color:var(--gold); text-decoration:none; font-size:0.9rem;">Back to Journal</a>
    </nav>

    <main class="article-container" id="content-target"></main>

    <div id="share-modal" onclick="closeShare()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:var(--navy);">Share this Story</h3>
            <div class="share-grid" id="share-links"></div>
            <button onclick="closeShare()" style="margin-top:20px; border:none; background:none; color:#718096; cursor:pointer; font-weight:bold;">Close</button>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-logo">YENC<span>.</span></div>
        <p style="opacity:0.7; font-size:0.9rem; margin-bottom:20px;">Empowering the youth of Calauag, Quezon.</p>
        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top:20px; font-size:0.8rem; opacity:0.5;">
            &copy; 2026 Youth Empowerment Network Calauag.
        </div>
    </footer>

    <script>
        const articles = [
            {
                id: "leadership-forum",
                title: "Empowering the Next Generation of Leaders",
                category: "Leadership",
                date: "May 11, 2026",
                author: "Reuel Josh Anda",
                authorBio: "Editor-in-Chief of YENC Journal and Grade 10 student leader dedicated to youth development.",
                authorImg: "../image_8925ed.jpg",
                image: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?w=800",
                fullContent: `<p>The Calauag Youth Empowerment Network recently hosted its premier Leadership Forum...</p><blockquote>"Empowered youth are the architects of a better tomorrow."</blockquote><p>We discussed accountability and community-driven action.</p>`
            },
            {
                id: "student-academic-performance",
                title: "Impact of AI on Student Performance",
                category: "Education",
                date: "May 15, 2026",
                author: "Reuel Josh Anda",
                authorBio: "Editor-in-Chief of YENC Journal and Grade 10 student leader dedicated to youth development.",
                authorImg: "../image_8925ed.jpg",
                image: "https://images.unsplash.com/photo-1501503060445-7096756386c6?w=800",
                fullContent: `<p>Artificial Intelligence is changing the landscape of education in Calauag...</p><blockquote>"Technology is a tool, but the student is the architect."</blockquote><p>We found that balanced usage leads to higher engagement.</p>`
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const currentId = params.get('id');
        const post = articles.find(a => a.id === currentId);
        const target = document.getElementById('content-target');

        if (post) {
            renderPost();
        } else {
            target.innerHTML = "<h1>Post not found</h1><a href='../blog.html'>Back to Journal</a>";
        }

        function renderPost() {
            target.innerHTML = `
                <a href="../blog.html" class="back-btn">← BACK TO JOURNAL</a>
                <header>
                    <span class="post-label">${post.category}</span>
                    <h1 class="post-title">${post.title}</h1>
                    <p style="color:#718096; margin-bottom:2rem;">Published ${post.date} • By ${post.author}</p>
                </header>
                <img src="${post.image}" class="post-img">
                <div class="post-text">${post.fullContent}</div>

                <div class="interaction-bar">
                    <button class="action-btn action-btn-like" onclick="this.classList.toggle('active')">❤ Like</button>
                    <button class="action-btn" onclick="openShare()">🔗 Share Story</button>
                </div>

                <div class="author-box">
                    <img src="${post.authorImg}" class="author-img">
                    <div class="author-info">
                        <h4 style="margin:0; font-size:1.3rem;">${post.author}</h4>
                        <p style="margin:5px 0 0; font-size:0.95rem; color:#718096; line-height:1.4;">${post.authorBio}</p>
                    </div>
                </div>
            `;
            document.title = `${post.title} | YENC`;
        }

        function openShare() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(post.title);
            document.getElementById('share-links').innerHTML = `
                <a href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" class="share-link fb">Facebook</a>
                <a href="https://twitter.com/intent/tweet?url=${url}&text=${text}" target="_blank" class="share-link x-com">X (Twitter)</a>
                <a href="https://www.threads.net/intent/post?text=${text}%20${url}" target="_blank" class="share-link threads">Threads</a>
                <a href="#" onclick="copyLink(event)" class="share-link copy">Copy Link</a>
            `;
            document.getElementById('share-modal').style.display = 'flex';
        }

        function closeShare() { document.getElementById('share-modal').style.display = 'none'; }

        function copyLink(e) {
            e.preventDefault();
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
            closeShare();
        }
    </script>
</body>
</html>
