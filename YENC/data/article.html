<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | YENC</title>
    <link rel="stylesheet" href="style.css"> <style>
        .article-view { max-width: 800px; margin: 120px auto; padding: 0 5%; }
        .full-img { width: 100%; height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 2rem; }
        .post-meta { color: var(--gold-500); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .post-title { font-size: 3rem; color: var(--navy-900); margin: 1rem 0; }
        .post-content { line-height: 1.8; font-size: 1.1rem; color: #4a5568; }
    </style>
</head>
<body>
    <main class="article-view">
        <div id="article-display">
            </div>
    </main>

    <script>
        // 1. Get the ID from the URL (e.g., article.html?id=1)
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get('id');

        // 2. The Data (This should match the list in blog.html)
        const myArticles = [ /* Paste your myArticles array here */ ];

        // 3. Find and Display
        const article = myArticles.find(a => a.id == articleId);
        const display = document.getElementById('article-display');

        if (article) {
            display.innerHTML = `
                <span class="post-meta">${article.category} • ${article.date}</span>
                <h1 class="post-title">${article.title}</h1>
                <img src="${article.image}" class="full-img">
                <div class="post-content">${article.content}</div>
                <a href="blog.html" style="display:inline-block; margin-top: 3rem; color: var(--gold-500);">← Back to Journal</a>
            `;
            document.title = `${article.title} | YENC`;
        } else {
            display.innerHTML = "<h1>Article not found.</h1>";
        }
    </script>
</body>
</html>
